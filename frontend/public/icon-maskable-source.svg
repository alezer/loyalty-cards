  <rect x="202" y="220" width="14" height="14" rx="3" fill="white"/>
  <rect x="230" y="220" width="14" height="14" rx="3" fill="white"/>
  <rect x="290" y="220" width="14" height="14" rx="3" fill="white"/>
  <rect x="348" y="220" width="14" height="14" rx="3" fill="white"/>
  <rect x="376" y="220" width="14" height="14" rx="3" fill="white"/>
  <rect x="404" y="220" width="14" height="14" rx="3" fill="white"/>

  <rect x="116" y="248" width="14" height="14" rx="3" fill="white"/>
  <rect x="202" y="248" width="14" height="14" rx="3" fill="white"/>
  <rect x="260" y="248" width="14" height="14" rx="3" fill="white"/>
  <rect x="318" y="248" width="14" height="14" rx="3" fill="white"/>
  <rect x="404" y="248" width="14" height="14" rx="3" fill="white"/>

  <rect x="144" y="276" width="14" height="14" rx="3" fill="white"/>
  <rect x="230" y="276" width="14" height="14" rx="3" fill="white"/>
  <rect x="288" y="276" width="14" height="14" rx="3" fill="white"/>
  <rect x="346" y="276" width="14" height="14" rx="3" fill="white"/>
  <rect x="404" y="276" width="14" height="14" rx="3" fill="white"/>

  <rect x="116" y="304" width="14" height="14" rx="3" fill="white"/>
  <rect x="172" y="304" width="14" height="14" rx="3" fill="white"/>
  <rect x="260" y="304" width="14" height="14" rx="3" fill="white"/>
  <rect x="318" y="304" width="14" height="14" rx="3" fill="white"/>
  <rect x="376" y="304" width="14" height="14" rx="3" fill="white"/>
  <rect x="404" y="304" width="14" height="14" rx="3" fill="white"/>

  <!-- Bottom-right cluster -->
  <rect x="376" y="358" width="14" height="14" rx="3" fill="white"/>
