<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Full-bleed green background (OS applies its own shape mask) -->
  <rect width="512" height="512" fill="#16a34a"/>

  <!-- Same face design scaled into the 80% safe zone (inset ~51px each side) -->

  <!-- LEFT EYE — QR finder pattern -->
  <rect x="82"  y="100" width="100" height="100" rx="10" fill="white"/>
  <rect x="98"  y="116" width="68"  height="68"  rx="6"  fill="#16a34a"/>
  <rect x="114" y="132" width="36"  height="36"  rx="4"  fill="white"/>

  <!-- RIGHT EYE — winking arc -->
  <path d="M 330 150 Q 382 190 434 150"
        stroke="white" stroke-width="20" fill="none" stroke-linecap="round"/>

  <!-- SMILE -->
  <path d="M 155 358 Q 256 445 357 358"
        stroke="white" stroke-width="20" fill="none" stroke-linecap="round"/>

  <!-- QR timing strip top -->
  <rect x="202" y="100" width="14" height="14" rx="3" fill="white"/>
  <rect x="230" y="100" width="14" height="14" rx="3" fill="white"/>
  <rect x="258" y="100" width="14" height="14" rx="3" fill="white"/>
  <rect x="286" y="100" width="14" height="14" rx="3" fill="white"/>
  <rect x="316" y="100" width="14" height="14" rx="3" fill="white"/>

  <!-- Timing strip left -->
  <rect x="82" y="220" width="14" height="14" rx="3" fill="white"/>
  <rect x="82" y="248" width="14" height="14" rx="3" fill="white"/>
  <rect x="82" y="276" width="14" height="14" rx="3" fill="white"/>
  <rect x="82" y="304" width="14" height="14" rx="3" fill="white"/>
  <rect x="82" y="332" width="14" height="14" rx="3" fill="white"/>

  <!-- Data modules -->
  <rect x="116" y="220" width="14" height="14" rx="3" fill="white"/>
