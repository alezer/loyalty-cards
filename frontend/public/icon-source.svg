<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Green rounded background -->
  <rect width="512" height="512" rx="96" fill="#16a34a"/>

  <!-- LEFT EYE — QR finder pattern (open eye: outer square → hollow → "pupil") -->
  <rect x="72"  y="90"  width="112" height="112" rx="10" fill="white"/>
  <rect x="90"  y="108" width="76"  height="76"  rx="6"  fill="#16a34a"/>
  <rect x="108" y="126" width="40"  height="40"  rx="4"  fill="white"/>

  <!-- RIGHT EYE — blinking / winking (downward arc = happy closed eyelid) -->
  <!-- Mirrors the finder: same y-center (146), same x-width (112), right-aligned -->
  <path d="M 328 146 Q 384 188 440 146"
        stroke="white" stroke-width="22" fill="none" stroke-linecap="round"/>

  <!-- SMILE — wide upward-opening arc in the lower third -->
  <path d="M 148 360 Q 256 455 364 360"
        stroke="white" stroke-width="22" fill="none" stroke-linecap="round"/>

  <!-- QR TEXTURE — timing strip across the top (between the two eyes) -->
  <rect x="204" y="90"  width="15" height="15" rx="3" fill="white"/>
  <rect x="234" y="90"  width="15" height="15" rx="3" fill="white"/>
  <rect x="264" y="90"  width="15" height="15" rx="3" fill="white"/>
  <rect x="294" y="90"  width="15" height="15" rx="3" fill="white"/>
  <rect x="313" y="90"  width="15" height="15" rx="3" fill="white"/>

  <!-- Timing strip down the left (below left eye) -->
  <rect x="72" y="222" width="15" height="15" rx="3" fill="white"/>
  <rect x="72" y="252" width="15" height="15" rx="3" fill="white"/>
  <rect x="72" y="282" width="15" height="15" rx="3" fill="white"/>
  <rect x="72" y="312" width="15" height="15" rx="3" fill="white"/>
  <rect x="72" y="340" width="15" height="15" rx="3" fill="white"/>

  <!-- Data modules — middle band -->
  <rect x="118" y="222" width="15" height="15" rx="3" fill="white"/>
  <rect x="148" y="222" width="15" height="15" rx="3" fill="white"/>
  <rect x="208" y="222" width="15" height="15" rx="3" fill="white"/>
  <rect x="238" y="222" width="15" height="15" rx="3" fill="white"/>
  <rect x="298" y="222" width="15" height="15" rx="3" fill="white"/>
  <rect x="358" y="222" width="15" height="15" rx="3" fill="white"/>
  <rect x="388" y="222" width="15" height="15" rx="3" fill="white"/>
  <rect x="418" y="222" width="15" height="15" rx="3" fill="white"/>

  <rect x="118" y="252" width="15" height="15" rx="3" fill="white"/>
  <rect x="208" y="252" width="15" height="15" rx="3" fill="white"/>
  <rect x="268" y="252" width="15" height="15" rx="3" fill="white"/>
  <rect x="328" y="252" width="15" height="15" rx="3" fill="white"/>
  <rect x="418" y="252" width="15" height="15" rx="3" fill="white"/>

  <rect x="148" y="282" width="15" height="15" rx="3" fill="white"/>
  <rect x="238" y="282" width="15" height="15" rx="3" fill="white"/>
  <rect x="298" y="282" width="15" height="15" rx="3" fill="white"/>
  <rect x="358" y="282" width="15" height="15" rx="3" fill="white"/>
  <rect x="418" y="282" width="15" height="15" rx="3" fill="white"/>

  <rect x="118" y="312" width="15" height="15" rx="3" fill="white"/>
  <rect x="178" y="312" width="15" height="15" rx="3" fill="white"/>
  <rect x="268" y="312" width="15" height="15" rx="3" fill="white"/>
  <rect x="328" y="312" width="15" height="15" rx="3" fill="white"/>
  <rect x="388" y="312" width="15" height="15" rx="3" fill="white"/>
  <rect x="418" y="312" width="15" height="15" rx="3" fill="white"/>

  <!-- Bottom-right data cluster (where the third QR finder would sit) -->
  <rect x="388" y="358" width="15" height="15" rx="3" fill="white"/>
  <rect x="418" y="358" width="15" height="15" rx="3" fill="white"/>
  <rect x="418" y="388" width="15" height="15" rx="3" fill="white"/>
  <rect x="418" y="418" width="15" height="15" rx="3" fill="white"/>

  <!-- Bottom-left scatter -->
  <rect x="102" y="358" width="15" height="15" rx="3" fill="white"/>
  <rect x="72"  y="388" width="15" height="15" rx="3" fill="white"/>
  <rect x="102" y="388" width="15" height="15" rx="3" fill="white"/>
</svg>
